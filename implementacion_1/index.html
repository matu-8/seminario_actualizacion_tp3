<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Alumnos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --surface2: #1e222e;
      --border: #2a2f3e;
      --accent: #e8ff5a;
      --accent2: #5affd6;
      --text: #eef0f5;
      --muted: #6b7280;
      --danger: #ff5a5a;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      background-image:
        radial-gradient(ellipse 60% 40% at 10% 0%, rgba(232,255,90,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(90,255,214,0.05) 0%, transparent 60%);
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    header .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: block;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* FORM */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .form-card h2 {
      font-size: 0.8rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 1.5rem;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 520px) {
      .fields { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field label {
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,90,0.12);
    }

    .field input::placeholder { color: var(--muted); }

    .form-actions {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn-add {
      background: var(--accent);
      color: #0d0f14;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232,255,90,0.25);
    }

    .btn-add:active { transform: translateY(0); }

    .btn-clear {
      background: transparent;
      color: var(--danger);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      border: 1px solid rgba(255,90,90,0.3);
      border-radius: 8px;
      padding: 0.65rem 1rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.05em;
    }

    .btn-clear:hover {
      background: rgba(255,90,90,0.08);
      border-color: var(--danger);
    }

    .msg-error {
      font-size: 0.82rem;
      color: var(--danger);
      font-family: 'DM Mono', monospace;
      margin-top: 0.5rem;
      min-height: 1.2em;
      animation: shake 0.3s ease;
    }

    /* TABLE SECTION */
    .table-section {
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .table-header h2 {
      font-size: 0.8rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent2);
    }

    .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.2rem 0.75rem;
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.85rem 1.25rem;
      text-align: left;
    }

    thead th.num { text-align: center; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody tr.new-row {
      animation: rowIn 0.4s ease both;
    }

    td {
      padding: 0.85rem 1.25rem;
      font-size: 0.95rem;
    }

    td.rank {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    td.name-cell { font-weight: 600; }

    td.age-cell {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--muted);
    }

    td.score-cell {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 0.2rem 0.65rem;
      font-size: 0.9rem;
      min-width: 48px;
    }

    .score-high { background: rgba(232,255,90,0.12); color: var(--accent); }
    .score-mid  { background: rgba(90,255,214,0.10); color: var(--accent2); }
    .score-low  { background: rgba(255,90,90,0.10);  color: var(--danger); }

    .btn-delete {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 1rem;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .btn-delete:hover {
      color: var(--danger);
      background: rgba(255,90,90,0.1);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.9rem; }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-18px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes rowIn {
      from { opacity:0; transform: translateX(-10px); }
      to   { opacity:1; transform: translateX(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <span class="tag">Sistema de notas</span>
    <h1>Registro de <span>Alumnos</span></h1>
    <p>Los datos se guardan automáticamente en tu navegador.</p>
  </header>

  <!-- FORM -->
  <div class="form-card">
    <h2>// Nuevo alumno</h2>
    <div class="fields">
      <div class="field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Ej: Ana García" maxlength="60"/>
      </div>
      <div class="field">
        <label for="edad">Edad</label>
        <input type="number" id="edad" placeholder="Ej: 18" min="1" max="120"/>
      </div>
      <div class="field">
        <label for="nota">Nota (0–10)</label>
        <input type="number" id="nota" placeholder="Ej: 8.5" min="0" max="10" step="0.1"/>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-add" onclick="agregarAlumno()">+ Agregar</button>
      <button class="btn-clear" onclick="limpiarTodo()">Borrar todo</button>
    </div>
    <div class="msg-error" id="error"></div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="table-header">
      <h2>// Listado ordenado</h2>
      <span class="count-badge" id="count">0 alumnos</span>
    </div>
    <div class="table-wrap">
      <table id="tabla">
        <thead>
          <tr>
            <th class="num">#</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Nota</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cuerpo"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = 'alumnos_v1';

  // ── Persistencia ──────────────────────────────────────────────
  function cargarDatos() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function guardarDatos(lista) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
  }

  // ── Ordenamiento: por nota desc, luego nombre asc ─────────────
  function ordenar(lista) {
    return [...lista].sort((a, b) => {
      if (b.nota !== a.nota) return b.nota - a.nota;
      return a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' });
    });
  }

  // ── Clase del pill según nota ─────────────────────────────────
  function claseNota(nota) {
    if (nota >= 7) return 'Puntaje Alto';
    if (nota >= 5) return 'Puntaje Bajo';
    return 'score-low';
  }

  // ── Renderizado de la tabla ───────────────────────────────────
  function renderTabla(resaltarId) {
    const alumnos = cargarDatos();
    const ordenados = ordenar(alumnos);
    const cuerpo = document.getElementById('cuerpo');
    const count = document.getElementById('count');

    count.textContent = `${alumnos.length} alumno${alumnos.length !== 1 ? 's' : ''}`;

    if (ordenados.length === 0) {
      cuerpo.innerHTML = `
        <tr><td colspan="5">
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>Aún no hay alumnos cargados.</p>
          </div>
        </td></tr>`;
      return;
    }

    cuerpo.innerHTML = ordenados.map((a, i) => `
      <tr class="${a.id === resaltarId ? 'new-row' : ''}">
        <td class="rank">${i + 1}</td>
        <td class="name-cell">${escapeHTML(a.nombre)}</td>
        <td class="age-cell">${a.edad} años</td>
        <td class="score-cell">
          <span class="score-pill ${claseNota(a.nota)}">${a.nota.toFixed(1)}</span>
        </td>
        <td>
          <button class="btn-delete" title="Eliminar" onclick="eliminarAlumno('${a.id}')">✕</button>
        </td>
      </tr>`).join('');
  }

  // ── Agregar alumno ────────────────────────────────────────────
  function agregarAlumno() {
    const nombre = document.getElementById('nombre').value.trim();
    const edadVal = document.getElementById('edad').value.trim();
    const notaVal = document.getElementById('nota').value.trim();
    const errorEl = document.getElementById('error');

    errorEl.textContent = '';

    if (!nombre) { mostrarError('Ingresá el nombre del alumno.'); return; }
    if (!edadVal) { mostrarError('Ingresá la edad.'); return; }
    if (!notaVal) { mostrarError('Ingresá la nota.'); return; }

    const edad = parseInt(edadVal, 10);
    const nota = parseFloat(notaVal);

    if (isNaN(edad) || edad < 1 || edad > 120) { mostrarError('Edad inválida (1–120).'); return; }
    if (isNaN(nota) || nota < 0 || nota > 10)   { mostrarError('Nota inválida (0–10).'); return; }

    const nuevo = { id: Date.now().toString(), nombre, edad, nota };
    const lista = cargarDatos();
    lista.push(nuevo);
    guardarDatos(lista);

    // Limpiar campos
    document.getElementById('nombre').value = '';
    document.getElementById('edad').value = '';
    document.getElementById('nota').value = '';
    document.getElementById('nombre').focus();

    renderTabla(nuevo.id);
  }

  // ── Eliminar alumno ───────────────────────────────────────────
  function eliminarAlumno(id) {
    const lista = cargarDatos().filter(a => a.id !== id);
    guardarDatos(lista);
    renderTabla(null);
  }

  // ── Limpiar todo ──────────────────────────────────────────────
  function limpiarTodo() {
    if (!confirm('¿Borrar todos los alumnos cargados?')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderTabla(null);
  }

  // ── Helpers ───────────────────────────────────────────────────
  function mostrarError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.animation = 'none';
    requestAnimationFrame(() => { el.style.animation = 'shake 0.3s ease'; });
  }

  function escapeHTML(str) {
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Permitir Enter para agregar
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') agregarAlumno();
  });

  // Carga inicial
  renderTabla(null);
</script>
</body>
</html>
